spring:
  application:
    name: notificador

  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: ${MAILTRAP_USERNAME}
    password: ${MAILTRAP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true

  thymeleaf:
    enabled: true
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8


envio:
  email:
    remetente: ${MAIL_REMETENTE}
    nomeRemetente: ${MAIL_NOME_REMETENTE}

server:
  port: 8082